<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام متجاوب</title>
    <style>
        body { 
            background-color: #1a1a2e; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #16213e;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            /* العرض الافتراضي للشاشات الكبيرة */
            width: 100%;
            max-width: 500px; 
            transition: all 0.3s ease;
        }

        /* --- السحر هنا: Media Query للشاشات الصغيرة (الجوال) --- */
        @media (max-width: 600px) {
            .container {
                padding: 1rem;
                background: #1b1b2f; /* تغيير طفيف في اللون للجوال */
            }
            h2 { font-size: 1.5rem; }
            input { width: 90% !important; }
        }

        input {
            padding: 15px;
            width: 80%;
            border-radius: 10px;
            border: 2px solid #0f3460;
            margin-bottom: 20px;
            font-size: 16px;
        }
        button {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            max-width: 200px;
            font-size: 18px;
        }
        button:hover { background-color: #c31432; }
        #message { margin-top: 20px; color: #4ecca3; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="container">
        <h2>نظام أتمتة عدن</h2>
        <p>مرحباً بك يا صديق، أدخل بياناتك:</p>
        
        <input type="text" id="userName" placeholder="الاسم الكامل...">
        <br>
        <button onclick="welcomeUser()">دخول النظام</button>

        <div id="message"></div>
    </div>

    <script>
        function welcomeUser() {
            let name = document.getElementById("userName").value;
            let msg = document.getElementById("message");
            if (name.trim() === "") {
                msg.style.color = "#e94560";
                msg.innerHTML = "يرجى كتابة الاسم!";
            } else {
                msg.style.color = "#4ecca3";
                msg.innerHTML = "تم تسجيل الدخول بنجاح: " + name;
            }
        }
    </script>

</body>
</html>
